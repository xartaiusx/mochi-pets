name: Bug report
description: Report a Mochi Social alpha problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Mochi Social. Do not include secrets, private member data, tester passwords, tokens, or wallet material.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest path that shows the issue.
      placeholder: |
        1. Open...
        2. Click...
        3. See...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Area
      options:
        - Unity room
        - Character presets
        - Lirabao interaction
        - Saved progress
        - Website embed contract
        - Build or checks
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Unity/editor/build context, or local command details.
