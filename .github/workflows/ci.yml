name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Mochi Pets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Secret scan
        run: npm run secret-scan

      - name: Alpha public copy
        run: npm run alpha:public-copy

      - name: Mochi Pets rename hygiene
        run: npm run rename-hygiene

      - name: Alpha readiness
        run: npm run alpha:readiness

      - name: Unity Cloud Code contract
        run: npm run unity:cloud-code-contract

      - name: Alpha gate contracts
        run: npm run alpha:gate-contracts

      - name: Alpha browser bridge auth
        run: npm run alpha:browser-bridge-auth

      - name: Alpha sync approval self-test
        run: npm run alpha:sync-approval-self-test

      - name: Alpha local evidence self-test
        run: npm run alpha:local-evidence-self-test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
