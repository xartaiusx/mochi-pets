name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify Mochi Social
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Secret scan
        run: npm run secret-scan

      - name: Alpha public copy
        run: npm run alpha:public-copy

      - name: Alpha readiness
        run: npm run alpha:readiness

      - name: Unity Cloud Code contract
        run: npm run unity:cloud-code-contract

      - name: Alpha gate contracts
        run: npm run alpha:gate-contracts

      - name: Alpha browser bridge auth
        run: npm run alpha:browser-bridge-auth

      - name: Alpha sync approval self-test
        run: npm run alpha:sync-approval-self-test

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
