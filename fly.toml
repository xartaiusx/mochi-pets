app = "mochi-pets-game"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  RPG_SAVE_DIR = "/data/saves"
  SUPABASE_AUTH_REQUIRED = "false"
  ENJIN_NETWORK = "CANARY"
  ENJIN_PLATFORM_URL = "https://platform.canary.enjin.io/graphql"
  MOCHI_PETS_PUBLIC_ORIGIN = "https://mochi-pets-game.fly.dev"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  processes = ["app"]
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"
    protocol = "http"
